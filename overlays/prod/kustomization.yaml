# n8n – prod overlay (namespace: n8n-prod, replace image with prod tag)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: n8n-prod

resources:
  - namespace.yaml
  - ../../base

# Replace n8n image for prod
images:
  - name: n8nio/n8n
    newName: 392746353565.dkr.ecr.us-east-1.amazonaws.com/n8n-images
    newTag: "9"

replicas:
  - name: n8n-worker
    count: 3
  # Or your ECR: newName: 392746353565.dkr.ecr.us-east-1.amazonaws.com/n8n-images

# n8n-env secret per overlay (copy n8n-env.env.example → n8n-env.env, do not commit n8n-env.env)
secretGenerator:
  - name: n8n-env
    envs:
      - n8n-env.env
    type: Opaque
    options:
      disableNameSuffixHash: true
