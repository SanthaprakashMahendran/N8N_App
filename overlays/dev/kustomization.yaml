# n8n – dev overlay (namespace: n8n-dev, replace image with dev tag)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: n8n-dev

resources:
  - namespace.yaml
  - ../../base

# Replace n8n image for dev (same image in main + worker)
images:
  - name: n8nio/n8n
    newName: 392746353565.dkr.ecr.us-east-1.amazonaws.com/n8n-images
    newTag: "fcc_14"
  # Or your ECR: newName: 392746353565.dkr.ecr.us-east-1.amazonaws.com/n8n-images

replicas:
  - name: n8n-main
    count: 1


