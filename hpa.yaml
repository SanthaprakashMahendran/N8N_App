# HPA: scales workers by CPU. For queue-based scaling (by job count), use KEDA instead
# (keda-scaledobject-worker.yaml + keda-trigger-auth-redis.yaml). Do not use both.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: n8n-hpa
  namespace: n8n
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-worker
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
