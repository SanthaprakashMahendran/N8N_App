apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:SanthaprakashMahendran/N8N_App.git
    path: overlays/dev
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
