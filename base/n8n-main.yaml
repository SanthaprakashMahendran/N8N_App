# n8n main: web UI + enqueues executions to Redis. Ensure n8n-env secret has
# QUEUE_BULL_REDIS_HOST, QUEUE_BULL_REDIS_PORT for queue mode (same Redis as workers).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: n8n-main
  namespace: n8n
spec:
  serviceName: n8n-main
  replicas: 1

  selector:
    matchLabels:
      app: n8n-main

  template:
    metadata:
      labels:
        app: n8n-main
        n8n-instance: "true"   # common label for PDB to protect both main and workers
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000

      containers:
        - name: n8n
          image: n8nio/n8n
          ports:
            - containerPort: 5678

          envFrom:
            - secretRef:
                name: n8n-env

          env:
            - name: EXECUTIONS_MODE
              value: "queue"

            - name: N8N_DISABLE_PRODUCTION_MAIN_PROCESS
              value: "true"

            # Prefer setting N8N_HOST/WEBHOOK_URL via n8n-env secret; ALB hostname can change on recreate
            - name: N8N_HOST
              value: "k8s-n8n-n8ningre-3d5006e992-1533802164.us-east-1.elb.amazonaws.com"
            - name: N8N_PROTOCOL
              value: "http"
            - name: WEBHOOK_URL
              value: "http://k8s-n8n-n8ningre-3d5006e992-1533802164.us-east-1.elb.amazonaws.com/"

          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          startupProbe:
            httpGet:
              path: /healthz
              port: 5678
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 15
            failureThreshold: 5

  volumeClaimTemplates:
    - metadata:
        name: n8n-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi

